# Formal specification of the six reference operators used in the
# mismatch matrix. Each operator maps a (trial, channel, time) array to
# another array of the same shape.
#
# X has shape [N, C, T]. "Per trial" means per-N, "per channel" per-C,
# "in time" along T.

operators:

  native:
    description: |
      Identity. Preserves the dataset's native reference (typically linked
      mastoids for IV-2a/OpenBMI, nose reference for Cho2017, etc.).
      Serves as the "no operation applied" baseline.

  car:
    description: |
      Common Average Reference. Per trial per timepoint, subtract the
      mean across all channels:
        Y[n, c, t] = X[n, c, t] - mean_c(X[n, :, t])
      Result: channel-wise mean is zero at every timepoint.

  median:
    description: |
      Robust CAR. Identical structure to CAR but with median instead of
      mean. Less sensitive to single-channel outliers / artifacts.
        Y[n, c, t] = X[n, c, t] - median_c(X[n, :, t])

  gs:
    description: |
      Gram-Schmidt reference. For each (trial, channel), project out the
      time-domain component of X[n,c,:] that is aligned with the mean of
      the OTHER channels r[n,c,:] = mean_{c'!=c} X[n,c',:]:
        Y[n,c,:] = X[n,c,:] - <X[n,c,:], r[n,c,:]> / <r[n,c,:], r[n,c,:]> * r[n,c,:]
      Result: <Y[n,c,:], r[n,c,:]> = 0 for every (n, c).
    params:
      eps: 1.0e-8

  laplacian:
    description: |
      Spatial Laplacian. For each channel c, subtract the mean of its
      k nearest spatial neighbors (Euclidean distance in the montage xyz
      coordinates). Emphasizes local sources.
        Y[n, c, t] = X[n, c, t] - (1/k) sum_{c' in N_k(c)} X[n, c', t]
    params:
      k: 4
      montage: standard_1005

  bipolar:
    description: |
      Bipolar reference using the single nearest neighbor per channel.
        Y[n, c, t] = X[n, c, t] - X[n, nn(c), t]
      More aggressive than Laplacian (differentiates a single pair of
      adjacent electrodes).
    params:
      montage: standard_1005

graph_construction:
  montage: standard_1005
  positions_source: mne.channels.make_standard_montage
  distance_metric: euclidean_3d
  self_neighbor: excluded   # diagonal of distance matrix is set to inf
