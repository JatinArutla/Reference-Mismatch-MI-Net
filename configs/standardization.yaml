# Standardization protocols applied AFTER the reference operator, BEFORE
# the model. Two protocols are used in the paper.

protocols:

  mechanistic:
    description: |
      Per-trial per-channel z-score along time. Each trial is normalized
      independently using its own per-channel statistics:
        mu = mean_t(X[n, c, :])
        sd = std_t(X[n, c, :])
        Y[n, c, t] = (X[n, c, t] - mu) / max(sd, eps)

      Because each trial gets its own transform, the model sees inputs
      of comparable scale regardless of which reference operator was
      applied. This ISOLATES the structural effect of the reference from
      trial-level scale variation, which is useful for mechanism studies.
      Applied consistently to train and test trials.
    params:
      eps: 1.0e-6
    use_cases:
      - 6x6 mismatch matrix (headline result)
      - Reference jitter (per-trial stats compose naturally with per-trial
        reference changes)

  deployment:
    description: |
      Per-channel (mu, sd) fitted on the training set only, pooled over
      trials and time, then applied to both train and test:
        mu[c] = mean_{n, t}(X_train[n, c, t])
        sd[c] = std_{n, t}(X_train[n, c, t])
        Y[n, c, t] = (X[n, c, t] - mu[c]) / max(sd[c], eps)

      This matches how a deployed BCI would actually run: fit standardization
      on calibration data once, apply to live data thereafter. Used for
      headline accuracy numbers that must be realistic.
    params:
      eps: 1.0e-6
    use_cases:
      - Headline accuracy numbers (deployment-realistic)
      - Within-session benchmarks where train/test come from separate sessions
