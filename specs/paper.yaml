paper_id: refshift_paper_v1
paper_type: benchmark_first
status: active_skeleton
scope:
  primary_claim: 'Reference mismatch is a severe, under-evaluated, deployment-relevant
    robustness failure mode in EEG motor imagery decoding. The failure is reproducible
    across datasets and substantially reduced by reference-jitter training.

    '
  non_load_bearing:
  - foundation_model_critique
  - cross_dataset_pretraining
  - strong_mechanistic_claims_beyond_empirical_support
  - ssl_as_central_claim
datasets:
  include:
  - iv2a
  - openbmi
  - cho2017
  - dreyer2023
preprocessing:
  montage_policy: native_per_dataset
  target_sfreq_hz: 250
  bandpass_hz:
  - 8.0
  - 32.0
  bandpass_status: provisional_default
  note: '8-32 Hz is the current default for implementation. Revisit with a small preprocessing-selection
    control before trusting headline numbers.

    '
  graph_position_policy: moabb_digmontage_when_explicit_else_standard_1005_fallback
  graph_position_policy_detail:
    iv2a: moabb_digmontage
    openbmi: moabb_digmontage
    cho2017: moabb_digmontage
    dreyer2023: standard_1005_fallback
experiment_ladder:
- tier1_atcnet_fixed_6x6
- tier2_jitter
- tier3_csp_lda
- tier4_preprocessing_mismatch_controls
- tier5_multiseed_stability
- tier6_lofo_family
- tier7_ssl_loso_lowlabel
workflow:
  interface: cli_first
  runner_policy: one_command_per_dataset_per_experiment_family
  cache_policy: preprocessed_subject_cache_before_reference_ops
